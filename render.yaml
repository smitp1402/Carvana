databases:
  - name: carvana-db
    plan: free
    databaseName: carvana
    user: carvana

services:
  - type: web
    name: carvana-ai-onboarding
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install &&
      npm install &&
      npm run build:css &&
      npm run build &&
      bundle exec rails assets:precompile &&
      bundle exec rails db:migrate &&
      bundle exec rails db:seed
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carvana-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MOCK_OCR
        value: "true"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
